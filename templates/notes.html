{% extends 'layout.html' %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', path='/css/notes.css') }}" />
{% endblock %}

{% block content %}

<div class="notes-header">
  <h1>My Notes</h1>

  <a href="/notes/create" class="create-note-btn">
    + New Note
  </a>
</div>

<div class="notes-grid">
  {% for note in notes %}
  <div class="note-card">

    <div class="card-header">
      <span>{{ note.date_created }}</span>
      <span class="tag">{{ note.category }}</span>
    </div>

    <h2>{{ note.title }}</h2>

    <p>{{ note.content[:120] }}...</p>

    <a href="/notes/{{ note.id }}">View Note →</a>

  </div>
  {% endfor %}
</div>

{% endblock %}

{% extends 'layout.html' %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', path='/css/note.css') }}" />
{% endblock %}

{% block content %}
  <div class="note-page">
    <div class="note-top">
      <a href="/notes" class="back-btn">← Back to Notes</a>

      <div class="note-actions">
        <a href="/notes/{{ note.id }}/edit" class="edit-btn">Edit</a>

        <button class="delete-btn">Delete</button>
      </div>
    </div>

    <div class="note-card">
      <div class="note-meta">
        <span class="category">{{ note.category }}</span>

        <span class="date">Created: {{ note.date_created }}</span>
      </div>

      <h1>{{ note.title }}</h1>

      <div class="note-content">{{ note.content }}</div>
    </div>
  </div>
{% endblock %}
